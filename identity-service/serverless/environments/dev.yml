NODE_ENV: development
STAGE: dev
AWS_REGION: us-east-1

# DynamoDB
DYNAMODB_TABLE_NAME: identity-service-dev

# EventBridge
IDENTITY_EVENT_BUS_NAME: identity-service-dev

# JWT - IMPORTANT: Change these in production!
JWT_SECRET: ${ssm:/identity-service/dev/jwt-secret}
JWT_ACCESS_EXPIRATION: 30m
JWT_REFRESH_EXPIRATION: 7d

# Security
BCRYPT_ROUNDS: 12

# Verification Codes
EMAIL_VERIFICATION_CODE_LENGTH: 6
EMAIL_VERIFICATION_EXPIRATION_MINUTES: 15
PASSWORD_RESET_CODE_LENGTH: 6
PASSWORD_RESET_EXPIRATION_MINUTES: 15

# Invites
INVITE_EXPIRATION_DAYS: 7

# Rate Limiting
MAX_VERIFICATION_RESENDS: 3
VERIFICATION_RESEND_COOLDOWN_MINUTES: 2
MAX_PASSWORD_RESET_RESENDS: 3
PASSWORD_RESET_RESEND_COOLDOWN_MINUTES: 2

# Frontend URLs
FRONTEND_URL: https://dev-app.yourdomain.com
INVITE_ACCEPT_PATH: /auth/accept-invite

# Flags
IS_OFFLINE: "false"
