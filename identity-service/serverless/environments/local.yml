NODE_ENV: local
STAGE: local
AWS_REGION: us-east-1

# DynamoDB
DYNAMODB_TABLE_NAME: identity-service-local
DYNAMODB_ENDPOINT: http://localhost:4566

# EventBridge
IDENTITY_EVENT_BUS_NAME: identity-service-local
EVENTBRIDGE_ENDPOINT: http://localhost:4010

# JWT
JWT_SECRET: local-dev-secret-key-not-for-production
JWT_ACCESS_EXPIRATION: 30m
JWT_REFRESH_EXPIRATION: 7d

# Security
BCRYPT_ROUNDS: 10

# Verification Codes
EMAIL_VERIFICATION_CODE_LENGTH: 6
EMAIL_VERIFICATION_EXPIRATION_MINUTES: 15
PASSWORD_RESET_CODE_LENGTH: 6
PASSWORD_RESET_EXPIRATION_MINUTES: 15

# Invites
INVITE_EXPIRATION_DAYS: 7

# Rate Limiting
MAX_VERIFICATION_RESENDS: 3
VERIFICATION_RESEND_COOLDOWN_MINUTES: 2
MAX_PASSWORD_RESET_RESENDS: 3
PASSWORD_RESET_RESEND_COOLDOWN_MINUTES: 2

# Frontend URLs
FRONTEND_URL: http://localhost:3000
INVITE_ACCEPT_PATH: /auth/accept-invite

# Flags
IS_OFFLINE: "true"

# AWS Credentials for LocalStack
AWS_DEFAULT_REGION: us-east1
AWS_ACCESS_KEY_ID: test
AWS_SECRET_ACCESS_KEY: test
AWS_ENDPOINT_URL: http://localhost:4567
