Resources:
  # Dead Letter Queue para eventos de email que falharam
  EmailDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: email-service-dlq-${self:provider.stage}
      MessageRetentionPeriod: 1209600  # 14 dias
      VisibilityTimeout: 300  # 5 minutos
      Tags:
        - Key: Service
          Value: email-service
        - Key: Purpose
          Value: dead-letter-queue
        - Key: Stage
          Value: ${self:provider.stage}

  # CloudWatch Alarm para monitorar mensagens na DLQ
  EmailDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: email-service-dlq-messages-${self:provider.stage}
      AlarmDescription: Alert when messages appear in Email Service DLQ
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Sum
      Period: 300  # 5 minutos
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt EmailDLQ.QueueName
      TreatMissingData: notBreaching

Outputs:
  EmailDLQArn:
    Description: ARN of the Email Service Dead Letter Queue
    Value: !GetAtt EmailDLQ.Arn
    Export:
      Name: EmailServiceDLQ-${self:provider.stage}

  EmailDLQUrl:
    Description: URL of the Email Service Dead Letter Queue
    Value: !Ref EmailDLQ
    Export:
      Name: EmailServiceDLQUrl-${self:provider.stage}
